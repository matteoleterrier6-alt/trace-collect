<!DOCTYPE html>
<html lang="fr">
<!-- ============================================================
TRACÉ v3c — BUILD COLLECTE. Fichier autonome, zéro build.
Objectif unique : enregistrer de VRAIS trajets pour recalibrer
TH/PEN (voir CLAUDE.md). Aucune feature nouvelle vs v3.

Déploiement : héberger ce fichier en HTTPS (GitHub Pages suffit),
l'ouvrir sur le téléphone. HTTPS est requis pour les capteurs iOS,
le wake lock ET crypto.subtle (sinon la chaîne ne scelle rien).

Fixes vs v3 (artifact) :
 1. Wake lock — l'écran reste allumé pendant veille + trajet,
    réacquis au retour de visibilité. Sans ça, iOS coupe les
    capteurs au verrouillage.
 2. Stockage — window.storage (artifact) → localStorage →
    mémoire, dans cet ordre. Clé v3c, pas de migration v3.
 3. Snapshot du trajet en cours toutes les 30 s → un crash ou un
    refresh ne perd plus le trajet (récupéré au prochain
    lancement, proposé à l'écran rôle avec option "jeter").
 4. La veille n'auto-démarre plus de trajet tant qu'un trajet
    attend son rôle (l'écrasement silencieux de `pending` est
    corrigé) ; AUTO.stopMs 90 s → 240 s (feux rouges, bouchons).
 5. Chaîne d'intégrité : plus de troncature à 60 trajets (elle
    s'auto-rompait au 61e) ; le hash scelle désormais TOUT le
    trajet (événements détaillés + tracé GPS), plus seulement
    le nombre d'événements.
 6. Attache capteurs idempotente — veille + démarrage manuel ne
    double plus les listeners ; la démo désarme la veille au lieu
    d'orpheliner son cleanup.
 7. Score = taux normalisé et non plus soustraction absolue :
    pénalités ramenées à 100 km puis converties en 0-100 (voir
    RATE dans PARAMÈTRES). Un long trajet souple score aussi
    haut ou plus haut qu'un trajet court. TH/PEN inchangés.
 8. Chocs de route filtrés : chaque candidat est observé pendant
    ROAD.windowMs ; si le pic vertical (le long de la gravité)
    domine le pic horizontal ET que l'horizontal retombe en moins
    de ROAD.maxMs, l'événement est classé « route dégradée » —
    loggé, visible sur le tracé, mais JAMAIS pénalisé. Seuls les
    événements horizontaux (freinage/accél/virage) pénalisent.
 9. Limites absurdes ignorées : si la vitesse soutenue dépasse
    LIMIT_SANE.factor × la limite annoncée, c'est la base qui a
    tort — jamais de pénalité dans ce cas, limite retirée du HUD
    après badMs, et valeur refusée au re-fetch tant que la vitesse
    reste incompatible (ou distrustMs écoulé).
11. Filtre chocs durci après test réel : ROAD desserré (dom 1.4 → 1.1,
    maxMs 150 → 320, fenêtre 420 ms — un dos-d'âne réel dure 250-400 ms
    et secoue aussi l'horizontal) + plafond physique PHYS.accelMax :
    une « accélération » > 0.5 g ne peut pas venir d'un moteur → classée
    route dégradée, jamais pénalisée. Le freinage fort reste pénalisé.
10. Retours du test réel : TH.light 0.30 → 0.40 (la conduite souple
    était flaggée) ; RATE recalibré (cost 0.25, minKm 8 — l'escalier
    −20/évt venait du plancher 5 km × coût 0.5 sur trajets courts) ;
    calibration de l'axe avant ORIENTÉE par la vitesse GPS (avant,
    accél/frein doux s'annulaient → sens de l'axe aléatoire → types
    frein/accél inversés une fois sur deux) ; taux pén./100 km
    affiché au bilan pour suivre la calibration.
 Divers : trajets < 30 s sans événement ni distance ignorés,
 durées > 1 h lisibles (fmtDur), état "chaîne inactive" affiché
 hors HTTPS.
============================================================ -->

<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect, useCallback } = React;

const STORE_KEY = "trace:trips:v3c";
const DRAFT_KEY = "trace:draft:v3c";

// ---------- PARAMÈTRES (tout se règle ici) ----------
const G = 9.81;
const TH = { light: 0.40, med: 0.45, hard: 0.62 };          // seuils d'à-coups (g) — light remonté de 0.30 (flaggait la conduite normale) ; plage à tester : 0.38-0.40
const PEN = { light: 2, med: 5, hard: 9 };                   // pénalités
const PEN_SPEED = { minor: 4, major: 10 };                   // excès <15 / >=15 km/h
const RATE = { cost: 0.25, minKm: 8 };                       // score = 100 − cost × (pénalités/100 km) ; minKm amortit les trajets courts. Un light isolé : −2.5 à 20 km, −6 au plancher (avant : −20, escalier fixe sous 5 km)
const ROAD = { dom: 1.1, maxMs: 320, windowMs: 420 };        // choc de route : |vert| > dom×|horiz| ET horiz élevé < maxMs → non pénalisé. Desserré après test réel : un dos-d'âne = 2 essieux + rebond (250-400 ms), et il secoue aussi l'horizontal
const PHYS = { accelMax: 0.5 };                              // plafond physique : un moteur ne produit pas > 0.5 g — « accélération » au-dessus = choc de route, jamais pénalisé (le freinage d'urgence, lui, peut dépasser 1 g et reste pénalisé)
const LIMIT_SANE = { factor: 1.8, badMs: 15000, distrustMs: 180000, clearFactor: 1.2 }; // limite absurde : vitesse soutenue > factor×limite → limite rejetée, jamais pénalisée ; réhabilitée après distrustMs ou vitesse ≤ clearFactor×limite
const COOLDOWN = 1200;                                       // ms entre événements
const ROT_UNSTABLE = 60, ROT_STABLE = 25;                    // °/s gyroscope (hystérésis)
const STABLE_DELAY = 1500;                                   // ms de calme avant reprise
const FWD = { min: 0.08, max: 0.28, need: 3.0 };             // calibration axe avant
const AUTO = { startKmh: 18, startMs: 8000, stopKmh: 6, stopMs: 240000 }; // stop 4 min : feux + bouchons
const OVERSPEED_TOL = 5;                                     // km/h de tolérance
const OVERSPEED_SUSTAIN = 5000;                              // ms au-dessus avant événement
const SNAPSHOT_MS = 30000;                                   // fréquence du snapshot anti-crash
const DRAFT_MIN_MS = 60000;                                  // draft récupérable si >= 1 min de données
const MIN_TRIP_SEC = 30;                                     // en-dessous, sans évt ni distance : ignoré

const HASH_OK = typeof crypto !== "undefined" && !!crypto.subtle; // faux hors HTTPS

// ---------- stockage : artifact → localStorage → mémoire ----------
const storageDriver = (() => {
  if (typeof window !== "undefined" && window.storage && typeof window.storage.get === "function") {
    return {
      name: "artifact",
      get: async (k) => { const r = await window.storage.get(k); return r && r.value != null ? r.value : null; },
      set: async (k, v) => { await window.storage.set(k, v); },
      del: async (k) => { try { await window.storage.delete(k); } catch (e) { try { await window.storage.set(k, ""); } catch (e2) {} } },
    };
  }
  try {
    const t = "__trace_test__";
    localStorage.setItem(t, "1"); localStorage.removeItem(t);
    return {
      name: "local",
      get: async (k) => localStorage.getItem(k),
      set: async (k, v) => { localStorage.setItem(k, v); },
      del: async (k) => { localStorage.removeItem(k); },
    };
  } catch (e) {}
  const mem = new Map();
  return {
    name: "memory",
    get: async (k) => (mem.has(k) ? mem.get(k) : null),
    set: async (k, v) => { mem.set(k, v); },
    del: async (k) => { mem.delete(k); },
  };
})();

async function loadTrips() {
  try { const raw = await storageDriver.get(STORE_KEY); return raw ? JSON.parse(raw) : []; }
  catch (e) { return []; }
}
async function saveTrips(t) {
  try { await storageDriver.set(STORE_KEY, JSON.stringify(t)); return true; }
  catch (e) { return false; }
}

// ---------- chaîne d'intégrité ----------
async function sha256(str) {
  try {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, "0")).join("");
  } catch (e) { return "nohash"; }
}
// Scelle TOUT le trajet (événements détaillés + tracé), pas juste le nombre d'événements.
const tripCore = (t) =>
  JSON.stringify({ id: t.id, date: t.date, score: t.score, pen100: t.pen100, durationSec: t.durationSec,
    distanceKm: t.distanceKm, role: t.role, mode: t.mode, unstableSec: t.unstableSec,
    recovered: !!t.recovered, events: t.events || [], path: t.path || [] });
    // pen100 absent des anciens trajets → clé omise par JSON.stringify → leurs hashs restent valides
async function sealTrip(trip, prevHash) {
  trip.prevHash = prevHash || "genesis";
  trip.hash = await sha256(trip.prevHash + tripCore(trip));
  return trip;
}
async function verifyChain(trips) {
  // trips[0] = plus récent ; la chaîne se lit de l'ancien vers le récent.
  // Aucun trajet n'est jamais tronqué → l'ancrage "genesis" reste valide.
  const asc = [...trips].reverse();
  let prev = "genesis";
  for (const t of asc) {
    if (!t.hash) return false;
    const h = await sha256((t.prevHash || "genesis") + tripCore(t));
    if (h !== t.hash || (t.prevHash || "genesis") !== prev) return false;
    prev = t.hash;
  }
  return true;
}

// ---------- limites de vitesse ----------
const limitCache = new Map();
async function fetchSpeedLimit(lat, lon) {
  const key = `${lat.toFixed(3)},${lon.toFixed(3)}`;
  if (limitCache.has(key)) return limitCache.get(key);
  try {
    const q = `[out:json][timeout:5];way(around:40,${lat},${lon})["maxspeed"];out tags 1;`;
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 5000);
    const res = await fetch("https://overpass-api.de/api/interpreter", {
      method: "POST", body: q, signal: ctrl.signal,
    });
    clearTimeout(to);
    const data = await res.json();
    const ms = data.elements && data.elements[0] && data.elements[0].tags ? data.elements[0].tags.maxspeed : null;
    const v = ms ? parseInt(ms, 10) : null;
    const out = Number.isFinite(v) ? v : null;
    limitCache.set(key, out);
    return out;
  } catch (e) { limitCache.set(key, null); return null; } // réseau bloqué → on dégrade
}

// ---------- utilitaires ----------
const sevOf = (g) => (g >= TH.hard ? "hard" : g >= TH.med ? "med" : "light");
const fmtT = (s) => `${Math.floor(s / 60)}:${Math.floor(s % 60).toString().padStart(2, "0")}`;
const fmtDur = (s) => s >= 3600
  ? `${Math.floor(s / 3600)}h${String(Math.floor((s % 3600) / 60)).padStart(2, "0")}`
  : fmtT(s);
// Score = taux normalisé, pas une soustraction absolue : les pénalités sont
// ramenées à 100 km, donc un long trajet souple score aussi haut (ou plus)
// qu'un trajet court. Le plancher minKm évite la division par ~0 en début de
// trajet et amortit les trajets très courts — le score « se stabilise » avec
// les kilomètres.
const rate100 = (penalty, distanceKm) =>
  (penalty / Math.max(distanceKm || 0, RATE.minKm)) * 100; // pénalités ramenées à 100 km
function computeScore(penalty, distanceKm) {
  return Math.max(0, Math.min(100, Math.round(100 - RATE.cost * rate100(penalty, distanceKm))));
}
const gradeOf = (s) =>
  s >= 90 ? { label: "Exemplaire", tone: "good" } :
  s >= 75 ? { label: "Solide", tone: "good" } :
  s >= 60 ? { label: "Perfectible", tone: "warn" } :
  s >= 40 ? { label: "Brusque", tone: "bad" } : { label: "À risque", tone: "bad" };
const TYPE_LABEL = { brake: "freinage", accel: "accélération", turn: "virage", jolt: "à-coup", speed: "excès vitesse", road: "route dégradée" };
function haversine(a, b) {
  const R = 6371000, r = Math.PI / 180;
  const dLat = (b.lat - a.lat) * r, dLon = (b.lon - a.lon) * r;
  const h = Math.sin(dLat / 2) ** 2 + Math.cos(a.lat * r) * Math.cos(b.lat * r) * Math.sin(dLon / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(h));
}
const compressPath = (pts) => pts.filter((_, i) => i % 3 === 0).map((p) => [
  Math.round(p.lat * 1e5) / 1e5, Math.round(p.lon * 1e5) / 1e5, Math.round(p.t)]);
function draftToTrip(d) {
  return {
    id: d.startAt, date: new Date(d.startAt).toISOString(),
    score: computeScore(d.penalty || 0, (d.dist || 0) / 1000),
    pen100: Math.round(rate100(d.penalty || 0, (d.dist || 0) / 1000) * 10) / 10,
    durationSec: Math.round((d.savedAt - d.startAt) / 1000),
    distanceKm: Math.round((d.dist || 0) / 100) / 10,
    events: d.events || [], path: d.path || [],
    unstableSec: Math.round((d.unstableMs || 0) / 1000),
    mode: d.mode || "live", recovered: true,
  };
}
function coachLines(events) {
  const c = { brake: 0, accel: 0, turn: 0, jolt: 0, speed: 0, road: 0 };
  events.forEach((e) => c[e.type || "jolt"]++);
  const out = [];
  if (!events.length) { out.push("Trajet net, zéro événement. Le profil que les assureurs récompensent."); return out; }
  if (c.speed >= 1) out.push(`${c.speed} excès de vitesse : c'est le facteur n°1 pour un assureur, avant même les freinages. Cale-toi sur la limite, tout le reste devient secondaire.`);
  if (c.brake >= 2) out.push(`${c.brake} freinages brusques : regarde plus loin devant, lève le pied plus tôt.`);
  if (c.accel >= 2) out.push(`${c.accel} accélérations sèches : reprise progressive, ça coûte zéro temps et beaucoup de points.`);
  if (c.turn >= 2) out.push(`${c.turn} virages appuyés : entre moins vite, ressors plus propre.`);
  if (!out.length) out.push("Conduite globalement souple. Encore un cran de douceur et tu montes de grade.");
  return out;
}

// ============================================================
function TraceCollect() {
  const [screen, setScreen] = useState("home"); // home | drive | role | summary | passport
  const [trips, setTrips] = useState([]);
  const [storageOk, setStorageOk] = useState(true);
  const [mode, setMode] = useState(null); // live | demo
  const [armed, setArmed] = useState(false); // mode veille
  const [hint, setHint] = useState("");
  const [ui, setUi] = useState(initUi());
  const [events, setEvents] = useState([]);
  const [pending, setPending] = useState(null); // trajet en attente de rôle
  const [summary, setSummary] = useState(null);
  const [chainOk, setChainOk] = useState(null);

  function initUi() {
    return { score: 100, gx: 0, gy: 0, gMag: 0, speed: 0, elapsed: 0, count: 0,
      cal: false, stable: true, unstableSec: 0, limit: null };
  }

  // refs moteur
  const running = useRef(false);
  const startAt = useRef(0);
  const penalty = useRef(0);
  const eventsRef = useRef([]);
  const lastEvAt = useRef(0);
  const pendingEv = useRef(null); // candidat en observation (fenêtre choc de route)
  const grav = useRef({ x: 0, y: 0, z: 0, set: false });
  const fwd = useRef({ x: 0, y: 0, z: 0, acc: 0, locked: false });
  const gNow = useRef({ x: 0, y: 0, mag: 0 });
  const rotEma = useRef(0);
  const stable = useRef(true);
  const stableSince = useRef(0);
  const unstableMs = useRef(0);
  const lastTick = useRef(0);
  const speedRef = useRef(0);
  const distRef = useRef(0);
  const lastPos = useRef(null);
  const pathRef = useRef([]); // {lat,lon,t}
  const limitRef = useRef(null);
  const overSince = useRef(0);
  const lastLimitFetch = useRef(0);
  const speedTrend = useRef(0);        // +1 vitesse GPS en hausse, −1 en baisse, 0 incertain (oriente l'axe avant)
  const lastKmhTrend = useRef(null);
  const speedEma = useRef(0);          // vitesse lissée (~7 s) pour juger la plausibilité des limites
  const implausibleSince = useRef(0);  // depuis quand la limite courante est incohérente
  const distrust = useRef(null);       // { value, until } : valeur de limite écartée, refusée au re-fetch
  const autoState = useRef({ overSince: 0, underSince: 0 });
  const gotReading = useRef(false);
  const cleanupRef = useRef(() => {});
  const sensorsOn = useRef(false);   // attache idempotente (fix double listeners)
  const wakeRef = useRef(null);      // sentinelle wake lock
  const demoTimer = useRef(null);
  const beginTripRef = useRef(() => {});
  const endTripRef = useRef(() => {});
  const armedRef = useRef(false);
  const autoStartedRef = useRef(false);
  const pendingRef = useRef(null);   // bloque l'auto-start tant qu'un rôle est en attente
  useEffect(() => { armedRef.current = armed; }, [armed]);
  useEffect(() => { pendingRef.current = pending; }, [pending]);

  // ---------- wake lock : l'écran reste allumé pendant veille + trajet ----------
  const acquireWake = useCallback(async () => {
    if (!("wakeLock" in navigator)) return false;
    if (wakeRef.current) return true;
    try {
      const s = await navigator.wakeLock.request("screen");
      wakeRef.current = s;
      s.addEventListener("release", () => { if (wakeRef.current === s) wakeRef.current = null; });
      return true;
    } catch (e) { return false; }
  }, []);
  const releaseWake = useCallback(() => {
    try { if (wakeRef.current) wakeRef.current.release(); } catch (e) {}
    wakeRef.current = null;
  }, []);
  useEffect(() => {
    const onVis = () => {
      if (document.visibilityState === "visible" && (running.current || armedRef.current)) acquireWake();
    };
    document.addEventListener("visibilitychange", onVis);
    return () => document.removeEventListener("visibilitychange", onVis);
  }, [acquireWake]);

  // ---------- chargement + récupération d'un trajet interrompu ----------
  useEffect(() => {
    (async () => {
      setStorageOk(storageDriver.name !== "memory");
      const t = await loadTrips();
      setTrips(t);
      setChainOk(await verifyChain(t));
      try {
        const raw = await storageDriver.get(DRAFT_KEY);
        if (raw) {
          const d = JSON.parse(raw);
          if (d && d.startAt && d.savedAt - d.startAt >= DRAFT_MIN_MS) {
            setPending(draftToTrip(d));
            setScreen("role");
          } else await storageDriver.del(DRAFT_KEY);
        }
      } catch (e) {}
    })();
  }, []);

  // ---------- snapshot anti-crash (trajets réels uniquement) ----------
  useEffect(() => {
    if (screen !== "drive" || mode === "demo") return;
    const iv = setInterval(() => {
      if (!running.current) return;
      const draft = {
        startAt: startAt.current, savedAt: Date.now(),
        penalty: penalty.current, events: eventsRef.current,
        dist: distRef.current, unstableMs: unstableMs.current,
        mode, path: compressPath(pathRef.current),
      };
      storageDriver.set(DRAFT_KEY, JSON.stringify(draft)).catch(() => {});
    }, SNAPSHOT_MS);
    return () => clearInterval(iv);
  }, [screen, mode]);

  // ---------- rafraîchissement HUD ----------
  useEffect(() => {
    if (screen !== "drive") return;
    const iv = setInterval(() => {
      if (!running.current) return;
      setUi({
        score: computeScore(penalty.current, distRef.current / 1000),
        gx: gNow.current.x, gy: gNow.current.y, gMag: gNow.current.mag,
        speed: speedRef.current,
        elapsed: (Date.now() - startAt.current) / 1000,
        count: eventsRef.current.length,
        cal: fwd.current.locked,
        stable: stable.current,
        unstableSec: Math.round(unstableMs.current / 1000),
        limit: limitRef.current,
      });
    }, 80);
    return () => clearInterval(iv);
  }, [screen]);

  const registerEvent = useCallback((gDyn, type, pen) => {
    const now = Date.now();
    if (type !== "speed" && now - lastEvAt.current < COOLDOWN) return;
    if (type !== "speed") lastEvAt.current = now;
    const sev = type === "speed" ? (pen >= PEN_SPEED.major ? "hard" : "med") : type === "road" ? "light" : sevOf(gDyn);
    penalty.current += pen != null ? pen : PEN[sev];
    const ev = { t: (now - startAt.current) / 1000, g: gDyn, sev, type: type || "jolt" };
    eventsRef.current = [...eventsRef.current, ev];
    setEvents((e) => [ev, ...e].slice(0, 40));
  }, []);

  const detachSensors = useCallback(() => {
    try { cleanupRef.current(); } catch (e) {}
    cleanupRef.current = () => {};
    sensorsOn.current = false;
  }, []);

  // ---------- capteurs réels (attache idempotente) ----------
  const attachSensors = useCallback(async (scoring) => {
    if (sensorsOn.current) return true; // déjà attachés (veille) → ne pas doubler
    gotReading.current = false;
    try {
      if (typeof DeviceMotionEvent !== "undefined" &&
          typeof DeviceMotionEvent.requestPermission === "function") {
        const res = await DeviceMotionEvent.requestPermission();
        if (res !== "granted") { setHint("Permission capteurs refusée. Lance une démo à la place."); return false; }
      }
    } catch (e) { setHint("Capteurs inaccessibles ici. Lance une démo, ou ouvre la page sur ton téléphone."); return false; }

    const onMotion = (e) => {
      const now = Date.now();
      const dt = lastTick.current ? now - lastTick.current : 16;
      lastTick.current = now;
      // --- stabilité (gyroscope) ---
      const r = e.rotationRate;
      if (r && r.alpha != null) {
        const rot = Math.sqrt(r.alpha ** 2 + r.beta ** 2 + r.gamma ** 2);
        rotEma.current += 0.15 * (rot - rotEma.current);
        if (stable.current && rotEma.current > ROT_UNSTABLE) { stable.current = false; stableSince.current = 0; }
        else if (!stable.current) {
          unstableMs.current += dt;
          if (rotEma.current < ROT_STABLE) {
            stableSince.current += dt;
            if (stableSince.current >= STABLE_DELAY) { stable.current = true; grav.current.set = false; } // re-calibre la gravité
          } else stableSince.current = 0;
        }
      }
      const a = e.accelerationIncludingGravity || e.acceleration;
      if (!a || a.x == null) return;
      gotReading.current = true;
      const gv = grav.current;
      if (!gv.set) { gv.x = a.x; gv.y = a.y; gv.z = a.z; gv.set = true; }
      else { const al = 0.02; gv.x += al * (a.x - gv.x); gv.y += al * (a.y - gv.y); gv.z += al * (a.z - gv.z); }
      const dx = a.x - gv.x, dy = a.y - gv.y, dz = a.z - gv.z;
      const gn = Math.sqrt(gv.x ** 2 + gv.y ** 2 + gv.z ** 2) || 1;
      const ux = gv.x / gn, uy = gv.y / gn, uz = gv.z / gn;
      const dot = dx * ux + dy * uy + dz * uz;
      const hx = dx - dot * ux, hy = dy - dot * uy, hz = dz - dot * uz;
      const hMag = Math.sqrt(hx ** 2 + hy ** 2 + hz ** 2) / G;
      gNow.current = { x: hx / G, y: hz / G, mag: stable.current ? hMag : 0 };
      if (!scoring() || !stable.current) { pendingEv.current = null; return; } // téléphone manipulé → rien ne compte
      const f = fwd.current;
      // Calibration ORIENTÉE par le GPS : accumulation signée par le sens de variation
      // de la vitesse — accélérer et freiner renforcent le même axe avant au lieu de
      // s'annuler. Avant, le sens de l'axe était aléatoire → frein/accél inversés.
      const trend = speedTrend.current;
      if (!f.locked && trend !== 0 && hMag > FWD.min && hMag < FWD.max) {
        f.x += trend * hx / G; f.y += trend * hy / G; f.z += trend * hz / G; f.acc += hMag;
        if (f.acc >= FWD.need) { const n = Math.hypot(f.x, f.y, f.z) || 1; f.x /= n; f.y /= n; f.z /= n; f.locked = true; }
      }
      // Un candidat n'est pas pénalisé à chaud : on l'observe pendant windowMs
      // pour distinguer un choc de route (pic vertical dominant, très bref) d'une
      // vraie manœuvre (horizontal soutenu). Seul l'horizontal est pénalisé.
      const vMag = Math.abs(dot) / G; // composante le long de la gravité
      const pe = pendingEv.current;
      if (pe) {
        if (hMag > pe.peakH) { pe.peakH = hMag; pe.hx = hx; pe.hy = hy; pe.hz = hz; }
        if (vMag > pe.peakV) pe.peakV = vMag;
        if (hMag >= TH.light) pe.lastAbove = now;
        if (now - pe.t0 >= ROAD.windowMs) {
          pendingEv.current = null;
          const elevatedMs = pe.lastAbove - pe.t0;
          if (pe.peakV > ROAD.dom * pe.peakH && elevatedMs <= ROAD.maxMs) {
            registerEvent(pe.peakH, "road", 0); // choc de route : loggé, zéro pénalité
          } else {
            let type = "jolt";
            if (f.locked) {
              const lon = (pe.hx / G) * f.x + (pe.hy / G) * f.y + (pe.hz / G) * f.z;
              const lat = Math.sqrt(Math.max(pe.peakH ** 2 - lon ** 2, 0));
              type = Math.abs(lon) >= lat ? (lon < 0 ? "brake" : "accel") : "turn";
            }
            // plafond physique : une « accélération » > accelMax ne peut pas venir du
            // moteur — c'est un choc (dos-d'âne) qui a fui dans le plan horizontal
            if (type === "accel" && pe.peakH > PHYS.accelMax) registerEvent(pe.peakH, "road", 0);
            else registerEvent(pe.peakH, type);
          }
        }
      } else if (hMag >= TH.light && now - lastEvAt.current >= COOLDOWN) {
        pendingEv.current = { t0: now, peakH: hMag, peakV: vMag, hx, hy, hz, lastAbove: now };
      }
    };
    window.addEventListener("devicemotion", onMotion);

    let watchId = null;
    if (navigator.geolocation) {
      watchId = navigator.geolocation.watchPosition(async (pos) => {
        const kmh = pos.coords.speed != null && pos.coords.speed >= 0 ? pos.coords.speed * 3.6 : speedRef.current;
        speedRef.current = kmh;
        speedEma.current += 0.15 * (kmh - speedEma.current); // vitesse soutenue (converge en ~7 s)
        // sens de variation de la vitesse : oriente la calibration de l'axe avant
        if (lastKmhTrend.current != null) {
          const dv = kmh - lastKmhTrend.current;
          speedTrend.current = dv > 1.5 ? 1 : dv < -1.5 ? -1 : 0;
        }
        lastKmhTrend.current = kmh;
        const p = { lat: pos.coords.latitude, lon: pos.coords.longitude };
        // --- détection auto (jamais pendant qu'un trajet attend son rôle) ---
        const A = autoState.current, now = Date.now();
        if (!running.current && armedRef.current && !pendingRef.current) {
          if (kmh >= AUTO.startKmh) { if (!A.overSince) A.overSince = now;
            if (now - A.overSince >= AUTO.startMs) { A.overSince = 0; beginTripRef.current("live", true); } }
          else A.overSince = 0;
        } else if (running.current) {
          if (kmh <= AUTO.stopKmh) { if (!A.underSince) A.underSince = now;
            if (autoStartedRef.current && now - A.underSince >= AUTO.stopMs) { A.underSince = 0; endTripRef.current(); } }
          else A.underSince = 0;
        }
        if (!running.current) { lastPos.current = p; return; }
        if (lastPos.current) { const d = haversine(lastPos.current, p); if (d > 2 && d < 500) distRef.current += d; }
        lastPos.current = p;
        pathRef.current.push({ lat: p.lat, lon: p.lon, t: (now - startAt.current) / 1000 });
        if (pathRef.current.length > 900) pathRef.current = pathRef.current.filter((_, i) => i % 2 === 0);
        // --- limites de vitesse (au plus 1 requête / 20 s) ---
        if (now - lastLimitFetch.current > 20000) {
          lastLimitFetch.current = now;
          fetchSpeedLimit(p.lat, p.lon).then((l) => {
            if (!l) return;
            // une valeur écartée reste refusée tant que la vitesse est incompatible
            if (distrust.current && l === distrust.current.value && Date.now() < distrust.current.until) return;
            limitRef.current = l;
          });
        }
        // --- plausibilité : une limite très en-dessous de la vitesse soutenue est une
        // erreur de base (mauvaise route OSM matchée), pas un excès du conducteur ---
        const lim = limitRef.current;
        if (lim && speedEma.current > lim * LIMIT_SANE.factor) {
          if (!implausibleSince.current) implausibleSince.current = now;
          if (now - implausibleSince.current >= LIMIT_SANE.badMs) {
            distrust.current = { value: lim, until: now + LIMIT_SANE.distrustMs };
            limitRef.current = null; implausibleSince.current = 0; overSince.current = 0;
          }
        } else implausibleSince.current = 0;
        // réhabilitation : vitesse redevenue compatible avec la valeur écartée, ou délai écoulé
        const bad = distrust.current;
        if (bad && (speedEma.current <= bad.value * LIMIT_SANE.clearFactor || now >= bad.until)) distrust.current = null;
        const lim2 = limitRef.current;
        if (lim2 && kmh > lim2 + OVERSPEED_TOL) {
          if (!overSince.current) overSince.current = now;
          if (now - overSince.current >= OVERSPEED_SUSTAIN) {
            // jamais de pénalité quand la vitesse elle-même rend la limite implausible
            if (kmh < lim2 * LIMIT_SANE.factor) {
              overSince.current = now + 15000; // anti-spam : 15 s avant le prochain
              const excess = kmh - lim2;
              registerEvent(0, "speed", excess >= 15 ? PEN_SPEED.major : PEN_SPEED.minor);
            }
          }
        } else overSince.current = 0;
      }, () => {}, { enableHighAccuracy: true, maximumAge: 1000 });
    }
    sensorsOn.current = true;
    cleanupRef.current = () => {
      window.removeEventListener("devicemotion", onMotion);
      if (watchId != null) navigator.geolocation.clearWatch(watchId);
    };
    setTimeout(() => {
      if (!gotReading.current && (running.current || armedRef.current))
        setHint("Aucune donnée capteur ici. Vérifie que la page est en HTTPS et ouverte sur un téléphone, ou lance une démo.");
    }, 3000);
    return true;
  }, [registerEvent]);

  // ---------- démo (n'écrase plus le cleanup des capteurs) ----------
  const startDemo = useCallback(() => {
    let phase = 0, lat = 48.54, lon = 2.66, heading = 0;
    fwd.current.locked = true;
    limitRef.current = 50;
    demoTimer.current = setInterval(() => {
      phase += 0.08;
      const ambX = Math.sin(phase * 1.3) * 0.12, ambY = Math.cos(phase) * 0.09;
      gNow.current = { x: ambX, y: ambY, mag: Math.hypot(ambX, ambY) };
      speedRef.current = Math.max(0, 42 + Math.sin(phase * 0.4) * 26 + (Math.random() - 0.5) * 4);
      distRef.current += (speedRef.current / 3.6) * 0.08;
      heading += (Math.random() - 0.5) * 0.25;
      lat += Math.cos(heading) * 0.00006; lon += Math.sin(heading) * 0.00009;
      pathRef.current.push({ lat, lon, t: (Date.now() - startAt.current) / 1000 });
      if (Math.random() < 0.012) limitRef.current = [50, 80, 110][Math.floor(Math.random() * 3)];
      if (Math.random() < 0.05) {
        const g = 0.3 + Math.random() * 0.5;
        const types = ["brake", "brake", "accel", "turn"];
        registerEvent(g, types[Math.floor(Math.random() * types.length)]);
      }
      if (Math.random() < 0.012)
        registerEvent(0, "speed", Math.random() < 0.5 ? PEN_SPEED.minor : PEN_SPEED.major);
      if (Math.random() < 0.02)
        registerEvent(0.3 + Math.random() * 0.4, "road", 0); // choc de route simulé, non pénalisé
      if (Math.random() < 0.01) { // instabilité simulée
        stable.current = false;
        setTimeout(() => { stable.current = true; }, 2500);
        unstableMs.current += 2500;
      }
    }, 80);
  }, [registerEvent]);

  const disarm = useCallback(() => {
    setArmed(false); armedRef.current = false; setHint("");
    if (!running.current) { detachSensors(); releaseWake(); }
  }, [detachSensors, releaseWake]);

  // ---------- cycle de trajet ----------
  const beginTrip = useCallback(async (which, auto) => {
    if (which === "demo" && armedRef.current) disarm(); // la démo désarme la veille proprement
    running.current = true;
    autoStartedRef.current = !!auto;
    startAt.current = Date.now();
    penalty.current = 0; eventsRef.current = []; lastEvAt.current = 0; pendingEv.current = null;
    grav.current = { x: 0, y: 0, z: 0, set: false };
    fwd.current = { x: 0, y: 0, z: 0, acc: 0, locked: false };
    gNow.current = { x: 0, y: 0, mag: 0 };
    rotEma.current = 0; stable.current = true; unstableMs.current = 0;
    speedRef.current = 0; distRef.current = 0; lastPos.current = null;
    pathRef.current = []; limitRef.current = null; overSince.current = 0;
    speedEma.current = 0; implausibleSince.current = 0; distrust.current = null;
    speedTrend.current = 0; lastKmhTrend.current = null;
    setEvents([]); setHint(""); setMode(which);
    setUi({ ...initUi(), cal: which === "demo" });
    setScreen("drive");
    if (which === "demo") { startDemo(); return; }
    const wl = await acquireWake();
    if (!wl) setHint("Écran non maintenu allumé (wake lock indisponible) : désactive le verrouillage auto du téléphone pour ce trajet.");
    if (!auto) { // si auto : capteurs déjà attachés par la veille (et attachSensors est idempotent)
      const ok = await attachSensors(() => running.current);
      if (!ok) running.current = false;
    }
  }, [attachSensors, startDemo, acquireWake, disarm]);
  useEffect(() => { beginTripRef.current = beginTrip; }, [beginTrip]);

  const armStandby = useCallback(async () => {
    setArmed(true); armedRef.current = true;
    const ok = await attachSensors(() => running.current);
    if (!ok) { setArmed(false); armedRef.current = false; return; }
    const wl = await acquireWake();
    setHint(wl
      ? "Veille active : le trajet démarrera seul dès que tu rouleras. L'écran restera allumé."
      : "Veille active — mais l'écran ne peut pas être maintenu allumé ici : désactive le verrouillage auto du téléphone, sinon la collecte s'arrêtera au premier verrouillage.");
  }, [attachSensors, acquireWake]);

  const endTrip = useCallback(() => {
    running.current = false;
    if (demoTimer.current) { clearInterval(demoTimer.current); demoTimer.current = null; }
    if (!armedRef.current) { detachSensors(); releaseWake(); } // veille armée → on garde tout pour le trajet suivant
    const durationSec = Math.round((Date.now() - startAt.current) / 1000);
    if (mode !== "demo" && durationSec < MIN_TRIP_SEC && !eventsRef.current.length && distRef.current < 50) {
      setScreen("home"); setHint("Trajet trop court — ignoré."); return;
    }
    const trip = {
      id: Date.now(), date: new Date().toISOString(),
      score: computeScore(penalty.current, distRef.current / 1000),
      pen100: Math.round(rate100(penalty.current, distRef.current / 1000) * 10) / 10,
      durationSec,
      distanceKm: Math.round(distRef.current / 100) / 10,
      events: eventsRef.current,
      path: compressPath(pathRef.current),
      unstableSec: Math.round(unstableMs.current / 1000),
      mode,
    };
    setPending(trip);
    setScreen("role");
  }, [mode, detachSensors, releaseWake]);
  useEffect(() => { endTripRef.current = endTrip; }, [endTrip]);

  const confirmRole = useCallback(async (role) => {
    const trip = { ...pending, role };
    const prevHash = trips.length ? trips[0].hash : "genesis";
    await sealTrip(trip, prevHash);
    const next = [trip, ...trips]; // pas de troncature : la chaîne reste ancrée sur genesis
    setTrips(next);
    if (storageOk) await saveTrips(next);
    await storageDriver.del(DRAFT_KEY);
    setChainOk(await verifyChain(next));
    setPending(null); setSummary(trip); setScreen("summary");
  }, [pending, trips, storageOk]);

  const discardPending = useCallback(async () => {
    await storageDriver.del(DRAFT_KEY);
    setPending(null); setScreen("home");
  }, []);

  useEffect(() => () => {
    try { cleanupRef.current(); } catch (e) {}
    if (demoTimer.current) clearInterval(demoTimer.current);
    releaseWake();
  }, [releaseWake]);

  const exportData = useCallback(() => {
    const blob = new Blob([JSON.stringify(trips, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "trace-donnees.json"; a.click();
    URL.revokeObjectURL(url);
  }, [trips]);

  return (
    <div className="ds-root">
      {screen === "home" && (
        <Home trips={trips} storageOk={storageOk} armed={armed} hint={hint} chainOk={chainOk}
          onLive={() => beginTrip("live", false)} onDemo={() => beginTrip("demo", false)}
          onArm={armStandby} onDisarm={disarm} onPassport={() => setScreen("passport")} />
      )}
      {screen === "drive" && (
        <Drive ui={ui} events={events} hint={hint} onEnd={endTrip} mode={mode} />
      )}
      {screen === "role" && pending && (
        <RoleAsk trip={pending} onPick={confirmRole} onDiscard={discardPending} />
      )}
      {screen === "summary" && summary && (
        <Summary trip={summary} trips={trips} onAgain={() => beginTrip(summary.mode, false)}
          onPassport={() => setScreen("passport")} onHome={() => setScreen("home")} />
      )}
      {screen === "passport" && (
        <Passport trips={trips} chainOk={chainOk} onHome={() => setScreen("home")} onExport={exportData} />
      )}
    </div>
  );
}

// ---------------- TRACÉ DU TRAJET ----------------
function RouteTrace({ trip }) {
  const pts = trip.path; // [lat, lon, t]
  const lats = pts.map((p) => p[0]), lons = pts.map((p) => p[1]);
  const minLa = Math.min(...lats), maxLa = Math.max(...lats);
  const minLo = Math.min(...lons), maxLo = Math.max(...lons);
  const W = 320, H = 150, pad = 14;
  const sx = (lo) => pad + ((lo - minLo) / Math.max(maxLo - minLo, 1e-6)) * (W - pad * 2);
  const sy = (la) => H - pad - ((la - minLa) / Math.max(maxLa - minLa, 1e-6)) * (H - pad * 2);
  const d = pts.map((p, i) => `${i ? "L" : "M"}${sx(p[1]).toFixed(1)},${sy(p[0]).toFixed(1)}`).join(" ");
  const evPts = (trip.events || []).map((e) => {
    let best = pts[0], bd = Infinity;
    for (const p of pts) { const dd = Math.abs(p[2] - e.t); if (dd < bd) { bd = dd; best = p; } }
    return { x: sx(best[1]), y: sy(best[0]), sev: e.sev, type: e.type };
  });
  return (
    <div className="ds-route">
      <span className="ds-hlabel">Le tracé</span>
      <svg viewBox={`0 0 ${W} ${H}`} className="ds-route-svg">
        <path d={d} className="ds-route-line" />
        <circle cx={sx(pts[0][1])} cy={sy(pts[0][0])} r="4" className="ds-route-start" />
        {evPts.map((p, i) => (
          <circle key={i} cx={p.x} cy={p.y} r={p.sev === "hard" ? 4.5 : 3.5}
            className={"ds-route-ev " + (p.sev === "hard" ? "bad" : "warn")} />
        ))}
      </svg>
    </div>
  );
}

// ---------------- PASSPORT ----------------
function Passport({ trips, chainOk, onHome, onExport }) {
  const real = trips.filter((t) => t.role !== "passenger");
  const n = real.length;
  const avg = n ? Math.round(real.reduce((s, t) => s + t.score, 0) / n) : 0;
  const g = gradeOf(avg);
  const totalSec = real.reduce((s, t) => s + t.durationSec, 0);
  const totalKm = Math.round(real.reduce((s, t) => s + (t.distanceKm || 0), 0) * 10) / 10;
  const allEv = real.flatMap((t) => t.events || []);
  const c = { brake: 0, accel: 0, turn: 0, jolt: 0, speed: 0, road: 0 };
  allEv.forEach((e) => c[e.type || "jolt"]++);
  const hours = Math.max(totalSec / 3600, 1 / 60);
  const penEv = allEv.filter((e) => e.type !== "road"); // les chocs de route ne comptent pas dans le taux
  const evPerH = Math.round((penEv.length / hours) * 10) / 10;
  const last5 = real.slice(0, 5), prev5 = real.slice(5, 10);
  const trend = last5.length && prev5.length
    ? Math.round(last5.reduce((s, t) => s + t.score, 0) / last5.length) -
      Math.round(prev5.reduce((s, t) => s + t.score, 0) / prev5.length)
    : null;

  return (
    <div className="ds-passport">
      <header className="ds-head">
        <span className="ds-mark">TRACÉ</span>
        <span className="ds-tag">passeport conducteur</span>
      </header>
      {n === 0 ? (
        <div className="ds-pass-empty">
          Ton passeport est vide. Roule un premier trajet en conducteur : chaque
          kilomètre devient une ligne de ta preuve.
          <button className="ds-btn ds-btn-ghost" onClick={onHome}>Retour</button>
        </div>
      ) : (
        <>
          <div className="ds-card">
            <div className="ds-card-top">
              <div className="ds-seal">
                <svg viewBox="0 0 120 120">
                  <circle cx="60" cy="60" r="54" className={"ds-seal-ring tone-" + g.tone} />
                  <circle cx="60" cy="60" r="46" className="ds-seal-inner" />
                </svg>
                <div className="ds-seal-center">
                  <span className={"ds-seal-score tone-" + g.tone}>{avg}</span>
                </div>
              </div>
              <div className="ds-card-id">
                <span className={"ds-card-grade tone-" + g.tone}>{g.label}</span>
                <span className="ds-card-line">{n} trajet{n > 1 ? "s" : ""} conducteur</span>
                <span className="ds-card-line">{fmtDur(totalSec)} de conduite{totalKm ? ` · ${totalKm} km` : ""}</span>
                {trend != null && (
                  <span className={"ds-card-line " + (trend >= 0 ? "tone-good" : "tone-bad")}>
                    tendance {trend >= 0 ? "+" : ""}{trend} pts (5 derniers)
                  </span>
                )}
              </div>
            </div>
            <div className="ds-card-stats">
              <div className="ds-cs"><span className="ds-cs-n">{evPerH}</span><span className="ds-cs-l">évts/h</span></div>
              <div className="ds-cs"><span className="ds-cs-n tone-bad">{c.brake}</span><span className="ds-cs-l">frein.</span></div>
              <div className="ds-cs"><span className="ds-cs-n tone-bad">{c.speed}</span><span className="ds-cs-l">vitesse</span></div>
              <div className="ds-cs"><span className="ds-cs-n tone-warn">{c.turn}</span><span className="ds-cs-l">virages</span></div>
            </div>
            {!HASH_OK ? (
              <div className="ds-chain warn">
                Chaîne d'intégrité inactive ici — ouvre la page en HTTPS pour que les trajets soient scellés.
              </div>
            ) : (
              <div className={"ds-chain " + (chainOk === false ? "bad" : "ok")}>
                {chainOk === false
                  ? "⚠ Chaîne d'intégrité rompue — des trajets ont été modifiés ou supprimés."
                  : "Chaîne d'intégrité vérifiée — aucun trajet modifié ni supprimé."}
              </div>
            )}
            <p className="ds-card-foot">
              Prototype — non certifié. La version finale ajoute l'horodatage
              serveur et la détection en arrière-plan pour rendre la preuve opposable.
            </p>
          </div>
          <div className="ds-progress ds-pass-spark">
            <span className="ds-hlabel">Historique des scores</span>
            <Spark trips={real} />
          </div>
          <div className="ds-cta">
            <button className="ds-btn ds-btn-ghost" onClick={onExport}>Exporter mes données (JSON)</button>
            <button className="ds-btn ds-btn-ghost" onClick={onHome}>Retour</button>
          </div>
        </>
      )}
    </div>
  );
}

// ---------------- sparkline ----------------
function Spark({ trips }) {
  const data = [...trips].reverse().map((t) => t.score);
  if (data.length < 2)
    return <div className="ds-sparkempty">Au moins deux trajets pour voir la courbe.</div>;
  const W = 320, H = 64, pad = 8;
  const min = Math.min(...data, 40), max = 100;
  const stepX = (W - pad * 2) / (data.length - 1);
  const pts = data.map((v, i) => [pad + i * stepX, pad + (1 - (v - min) / (max - min)) * (H - pad * 2)]);
  const d = pts.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(" ");
  const area = `${d} L${pts[pts.length - 1][0]},${H - pad} L${pts[0][0]},${H - pad} Z`;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="ds-spark" preserveAspectRatio="none">
      <path d={area} className="ds-spark-area" />
      <path d={d} className="ds-spark-line" />
      {pts.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r="2.5" className="ds-spark-pt" />)}
    </svg>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<TraceCollect />);
</script>
